<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trip-In | Hyderabad Travel Planner</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- HERO SECTION -->

<section class="hero">

<div class="overlay">

<div class="hero-content">

<h1>TRIP-IN</h1>

<p>
Explore Hyderabad Without Confusion
</p>

<button id="startBtn">
Welcome To Trip-In
</button>

</div>

</div>

</section>

<!-- PLANNER SECTION -->

<section id="planner" class="hidden">

<div class="planner-container">

<h2>
Plan Your Hyderabad Trip
</h2>

<p>
Choose your stay duration and budget.
</p>

<div class="form-group">

<label>
Select Duration
</label>

<select id="duration">

<option value="">
Choose Duration
</option>

<option value="2">
2 Days 1 Night
</option>

<option value="3">
3 Days 2 Nights
</option>

<option value="4">
4 Days 3 Nights
</option>

</select>

</div>

<div class="form-group">

<label>
Select Budget
</label>

<input
type="range"
min="2000"
max="15000"
step="500"
value="5000"
id="budgetSlider"
>

<p id="budgetValue">
₹5000
</p>

</div>

<button id="generateBtn">
Generate My Plan
</button>

</div>

</section>

<!-- RESULTS -->

<section id="resultsSection" class="hidden">

<h2>
Your Hyderabad Travel Plan
</h2>

<div id="results">

</div>

</section>

<script src="data.js"></script>
<script src="app.js"></script>

</body>

</html>
